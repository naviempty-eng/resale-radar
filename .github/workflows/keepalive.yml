name: Keep Render Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health
        run: |
          curl --fail --silent --show-error --max-time 30 \
            https://resale-radar-api.onrender.com/api/health
