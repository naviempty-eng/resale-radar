services:
  - type: web
    name: resale-radar-mini-app
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://resale-radar-api.onrender.com

  - type: web
    name: resale-radar-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      - key: MINI_APP_URL
        value: https://resale-radar-mini-app.onrender.com
      - key: SUPPORT_USERNAME
        value: support
      - key: ADMIN_TELEGRAM_IDS
        value: 8358919732
      - key: SEED_DEMO_DATA
        value: true
